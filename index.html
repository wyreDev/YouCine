<!DOCTYPE html>

        <div class="login">
            <h2>
                <p class="hii">MuziFy+</p>

            </div>
            <script src="wyre.js"></script>
            
            <div>
                <p class="flexend">or</p>
            </div>
            
            <div>
                <button class="signup" onclick="window.location.href='register.html'">Sign Up</button>
            </div>
        </div>
    </div>
    
</body>
</html>
