<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wyredev.com - Video Sharing Platform</title>
    <link rel="stylesheet" href="weed.css">
       
</head>
<body>
    <!-- Header with search functionality -->
    <header>
        <div class="logo">
            <h1>Mu<span>zify+</span></h1>
        </div>
        
        <div class="search-container">
            <input class="search-box" type="text" placeholder="wyre-search" list="categories">
            <datalist id="categories">
                <option value="music">Music</option>
                <option value="videos">Videos</option>
                <option value="movies">Movies</option>
                <option value="animation">Animation</option>
            </datalist>
            <button class="search-btn">Search</button>
        </div>
        
        <div class="account-actions">
            <button class="weedme" onclick="window.location.href='upload.html'">
                Upload Video
            </button>
            <button class="weedme">
                <<<<
                ADMIN
                >>>>
            </button>
        </div>
    </header>
    
    <div class="container">
        <h2 class="section-title">Video Library</h2>
        <div class="videos-grid" id="videosGrid"></div>
        <p id="emptyMessage" style="color: #ccc; text-align: center; margin-top: 1rem; display: none;">No videos available. Add new metadata via Upload.</p>
    </div>
    
    <!-- Footer with contact information -->
    <footer class="contact-info">
        <p class="contact-text">Input correct music video/movie/series title at <span class="contact-highlight">wyre-0726547799</span> or email <span class="contact-highlight">contact@wyredev.com</span></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchBtn = document.querySelector('.search-btn');
            const searchBox = document.querySelector('.search-box');
            const videosGrid = document.getElementById('videosGrid');
            const emptyMessage = document.getElementById('emptyMessage');

            async function loadVideos(query = '') {
                const endpoint = query ? `/api/videos?query=${encodeURIComponent(query)}` : '/api/videos';
                try {
                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error('Could not load videos');
                    const data = await response.json();
                    renderVideos(data.videos || []);
                } catch (error) {
                    console.error('Load videos error:', error);
                    videosGrid.innerHTML = '';
                    emptyMessage.textContent = 'Unable to load videos. Try again later.';
                    emptyMessage.style.display = 'block';
                }
            }

            function renderVideos(videos) {
                videosGrid.innerHTML = '';
                if (!videos.length) {
                    emptyMessage.textContent = 'No videos available. Add new metadata via Upload.';
                    emptyMessage.style.display = 'block';
                    return;
                }
                emptyMessage.style.display = 'none';
                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';

                    const thumb = document.createElement('div');
                    thumb.className = 'thumbnail-container';
                    const videoElem = document.createElement('video');
                    videoElem.className = 'thumbnails';
                    videoElem.controls = true;
                    const sourceElem = document.createElement('source');
                    sourceElem.src = video.src;
                    sourceElem.type = 'video/mp4';
                    videoElem.appendChild(sourceElem);
                    thumb.appendChild(videoElem);

                    const info = document.createElement('div');
                    info.className = 'video-info';
                    info.innerHTML = `
                        <h3 class="video-title">${video.title}</h3>
                        <p class="video-author">${video.author}</p>
                        <p class="video-description">${video.description}</p>
                        <div class="video-actions">
                            <button class="btn btn-download">Download</button>
                            <button class="btn btn-watch">+ Watch later</button>
                            <button class="btn btn-share">Share</button>
                        </div>
                    `;

                    card.appendChild(thumb);
                    card.appendChild(info);
                    videosGrid.appendChild(card);
                });
            }

            async function performSearch() {
                const query = searchBox.value.trim();
                await loadVideos(query);
            }

            searchBtn.addEventListener('click', performSearch);
            searchBox.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('btn-download')) {
                    alert('Download feature would be implemented here');
                } else if (e.target.classList.contains('btn-watch')) {
                    e.target.textContent = e.target.textContent === '+ Watch later' ? '✓ Added' : '+ Watch later';
                } else if (e.target.classList.contains('btn-share')) {
                    alert('Share feature would be implemented here');
                }
            });

            loadVideos();
        });
    </script>
</body>
</html>
